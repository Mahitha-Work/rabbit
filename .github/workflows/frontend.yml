name: Deploy react app frontend
on:
  push:
    branches: 
      - main
    

permissions:
  contents: write


jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build
      
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: frontend/dist


  deploy:    
    needs: build
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-files
          path: dist 
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
      - name: Output Domain Name
        run: |
          echo "Your site is deployed at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          
